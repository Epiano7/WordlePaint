<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordlePaint</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <h1>WordlePaint</h1>
      <p class="tagline">Paint a six-row Wordle board, then solve it in the browser.</p>
    </section>

    <section class="workspace">
      <div class="board-panel">
        <div class="controls-card">
          <div class="topbar-row">
            <button id="theme-toggle-button" type="button" class="secondary toggle-button">Theme: Auto</button>
          </div>

          <label class="answer-field">
            <span>Answer Word</span>
            <input id="answer-input" type="text" maxlength="5" autocomplete="off" spellcheck="false" placeholder="cubit">
          </label>

          <div class="button-row">
            <button id="solve-button" type="button">Solve Board</button>
            <button id="clear-letters-button" type="button" class="secondary">Clear Letters</button>
            <button id="reset-board-button" type="button" class="secondary">Reset Board</button>
          </div>

          <div class="help-strip">
            <span>Left click = green</span>
            <span>Right click = yellow</span>
            <span><kbd>X</kbd> / <kbd>Delete</kbd> = gray</span>
          </div>

          <div class="help-strip">
            <span><kbd>G</kbd> = green</span>
            <span><kbd>Y</kbd> = yellow</span>
            <span>Arrow keys move selection</span>
          </div>

          <p id="status-line" class="status-line">Loading words.txt...</p>
        </div>

        <div id="board" class="board" aria-label="Wordle board"></div>
      </div>

      <aside class="results-panel">
        <div class="results-header">
          <h2>Console</h2>
        </div>
        <pre id="results-output" class="results-output">Ready.</pre>
      </aside>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
